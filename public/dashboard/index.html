<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة تحكم Saber Jo Snack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root {
    --bg: #14161c; --panel: #1d2027; --panel-2: #242832; --line: #333743;
    --amber: #ff9f1c; --amber-dim: #c97c12; --olive: #93a86a; --red: #e2483d;
    --ink: #eee9de; --ink-dim: #9a9caa;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: Tahoma, "Segoe UI", sans-serif; }
  input, textarea, select { font-family: inherit; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
  .panel-2 { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; }
  .btn { background: var(--amber); color: #1a1200; font-weight: 700; border: none; border-radius: 8px; padding: 9px 16px; cursor: pointer; font-size: 14px; }
  .btn:hover { background: var(--amber-dim); }
  .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink); border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
  .btn-ghost:hover { border-color: var(--amber); color: var(--amber); }
  .btn-danger { background: rgba(226,72,61,0.15); color: var(--red); border: 1px solid rgba(226,72,61,0.4); border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
  input, textarea, select { background: var(--panel-2); border: 1px solid var(--line); color: var(--ink); border-radius: 6px; padding: 8px 10px; font-size: 14px; width: 100%; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--amber); }
  .tag { font-size: 12px; padding: 3px 10px; border-radius: 999px; }
  .tag-on { background: rgba(147,168,106,0.18); color: var(--olive); border: 1px solid rgba(147,168,106,0.4); }
  .tag-off { background: rgba(226,72,61,0.15); color: var(--red); border: 1px solid rgba(226,72,61,0.4); }
  .nav-item { display: block; width: 100%; text-align: right; background: none; border: none; color: var(--ink-dim); padding: 10px 16px; cursor: pointer; font-size: 14px; border-right: 3px solid transparent; }
  .nav-item.active { color: var(--amber); background: var(--panel-2); border-right-color: var(--amber); }
  .nav-item:hover:not(.active) { color: var(--ink); background: var(--panel-2); }
  ::placeholder { color: #6b6d78; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

// ---------------- API helper ----------------
function useApi() {
  const token = localStorage.getItem("sj_token");
  const call = useCallback(async (path, opts = {}) => {
    const res = await fetch(path, {
      ...opts,
      headers: {
        "Content-Type": "application/json",
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...(opts.headers || {}),
      },
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if (res.status === 401) {
      localStorage.removeItem("sj_token");
      window.location.reload();
      throw new Error("انتهت الجلسة");
    }
    const data = await res.json().catch(() => null);
    if (!res.ok) throw new Error(data?.error || "صار خطأ");
    return data;
  }, [token]);
  return call;
}

// ---------------- Login ----------------
function Login({ onLoggedIn }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    setLoading(true);
    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "فشل الدخول");
      localStorage.setItem("sj_token", data.token);
      localStorage.setItem("sj_employee", JSON.stringify(data.employee));
      onLoggedIn(data.employee);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <form onSubmit={submit} className="panel" style={{ width: 340, padding: 28 }}>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 22, fontWeight: 700 }}><span style={{ color: "var(--amber)" }}>Saber</span> Jo Snack</div>
          <div style={{ fontSize: 12, color: "var(--ink-dim)" }}>لوحة تحكم البوت</div>
        </div>
        <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>الإيميل</label>
        <div style={{ marginBottom: 12, marginTop: 4 }}>
          <input type="email" dir="ltr" value={email} onChange={(e) => setEmail(e.target.value)} required />
        </div>
        <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>كلمة المرور</label>
        <div style={{ marginBottom: 16, marginTop: 4 }}>
          <input type="password" dir="ltr" value={password} onChange={(e) => setPassword(e.target.value)} required />
        </div>
        {error && <div style={{ color: "var(--red)", fontSize: 13, marginBottom: 12 }}>{error}</div>}
        <button className="btn" style={{ width: "100%" }} disabled={loading}>{loading ? "..." : "دخول"}</button>
      </form>
    </div>
  );
}

// ---------------- QR / Connection panel ----------------
function ConnectionPanel({ bot, api, refreshBots }) {
  const [qr, setQr] = useState(null);
  const [status, setStatus] = useState("connecting");
  const [conn, setConn] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    let stop = false;
    const poll = async () => {
      try {
        const data = await api(`/api/bots/${bot.id}/qr`);
        if (stop) return;
        setStatus(data.status);
        setQr(data.qrImage);
      } catch {}
    };
    poll();
    const interval = setInterval(poll, 4000);
    return () => { stop = true; clearInterval(interval); };
  }, [bot.id]);

  useEffect(() => {
    api(`/api/bots/${bot.id}/connection`).then(setConn).catch(() => {});
  }, [bot.id]);

  const toggleBot = async () => {
    await api(`/api/bots/${bot.id}/${bot.enabled === false ? "start" : "stop"}`, { method: "POST" });
    refreshBots();
  };

  const saveConnection = async () => {
    setSaving(true);
    try {
      await api(`/api/bots/${bot.id}/connection`, { method: "PUT", body: conn });
      alert("تم الحفظ ✅");
    } finally {
      setSaving(false);
    }
  };

  if (!conn) return null;
  const provider = conn.waProvider || "";
  const creds = conn.waCredentials || {};
  const setCred = (k, v) => setConn({ ...conn, waCredentials: { ...creds, [k]: v } });

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <div className="panel" style={{ padding: 20, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>حالة البوت "{bot.name}"</div>
          <span className={`tag ${bot.enabled === false ? "tag-off" : "tag-on"}`}>
            {bot.enabled === false ? "موقوف" : "شغال"}
          </span>
        </div>
        <button className={bot.enabled === false ? "btn" : "btn-danger"} onClick={toggleBot}>
          {bot.enabled === false ? "▶ تشغيل البوت" : "⏸ إيقاف البوت"}
        </button>
      </div>

      {provider === "selfhosted" && (
        <div className="panel" style={{ padding: 20, textAlign: "center" }}>
          <div style={{ fontWeight: 700, marginBottom: 12 }}>ربط واتساب (اتصال مباشر)</div>
          {status === "connected" ? (
            <div style={{ color: "var(--olive)" }}>متصل بواتساب ✅</div>
          ) : qr ? (
            <div>
              <img src={qr} style={{ width: 220, height: 220 }} />
              <p style={{ fontSize: 13, color: "var(--ink-dim)" }}>واتساب ← الأجهزة المرتبطة ← ربط جهاز</p>
            </div>
          ) : (
            <p style={{ color: "var(--ink-dim)" }}>عم نجهز رمز QR...</p>
          )}
        </div>
      )}

      <div className="panel" style={{ padding: 20 }}>
        <div style={{ fontWeight: 700, marginBottom: 4 }}>إعدادات الربط</div>
        <p style={{ fontSize: 12, color: "var(--ink-dim)", marginBottom: 14 }}>
          حدد المزود والمفاتيح من هون بدل ما تروح لـ Render يدوياً.
        </p>

        <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>المزود</label>
        <div style={{ margin: "4px 0 14px" }}>
          <select value={provider} onChange={(e) => setConn({ ...conn, waProvider: e.target.value })}>
            <option value="">افتراضي السيرفر (.env)</option>
            <option value="selfhosted">اتصال مباشر (بدون وسيط)</option>
            <option value="wasender">WasenderAPI</option>
            <option value="ultramsg">UltraMsg</option>
            <option value="green">Green API</option>
            <option value="cloud">Meta Cloud API (الرسمي)</option>
          </select>
        </div>

        {provider === "wasender" && (
          <div style={{ marginBottom: 10 }}>
            <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>WASENDER API KEY</label>
            <input dir="ltr" value={creds.wasenderApiKey || ""} onChange={(e) => setCred("wasenderApiKey", e.target.value)} />
          </div>
        )}
        {provider === "ultramsg" && (
          <>
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>Instance ID</label>
              <input dir="ltr" value={creds.ultramsgInstanceId || ""} onChange={(e) => setCred("ultramsgInstanceId", e.target.value)} />
            </div>
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>Token</label>
              <input dir="ltr" value={creds.ultramsgToken || ""} onChange={(e) => setCred("ultramsgToken", e.target.value)} />
            </div>
          </>
        )}
        {provider === "green" && (
          <>
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>Instance ID</label>
              <input dir="ltr" value={creds.greenApiInstanceId || ""} onChange={(e) => setCred("greenApiInstanceId", e.target.value)} />
            </div>
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>Token</label>
              <input dir="ltr" value={creds.greenApiToken || ""} onChange={(e) => setCred("greenApiToken", e.target.value)} />
            </div>
          </>
        )}
        {provider === "cloud" && (
          <>
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>Phone Number ID</label>
              <input dir="ltr" value={creds.whatsappPhoneNumberId || ""} onChange={(e) => setCred("whatsappPhoneNumberId", e.target.value)} />
            </div>
            <div style={{ marginBottom: 10 }}>
              <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>Access Token</label>
              <input dir="ltr" value={creds.whatsappToken || ""} onChange={(e) => setCred("whatsappToken", e.target.value)} />
            </div>
          </>
        )}

        <button className="btn" onClick={saveConnection} disabled={saving}>{saving ? "..." : "حفظ إعدادات الربط"}</button>
      </div>
    </div>
  );
}

// ---------------- Menu panel ----------------
function MenuPanel({ bot, api }) {
  const [items, setItems] = useState([]);
  const [newName, setNewName] = useState("");

  const load = () => api(`/api/bots/${bot.id}/menu`).then(setItems);
  useEffect(() => { load(); }, [bot.id]);

  const save = async (updated) => {
    setItems(updated);
    await api(`/api/bots/${bot.id}/menu`, { method: "PUT", body: updated });
  };

  const addItem = () => {
    if (!newName.trim()) return;
    save([...items, { id: Date.now(), name: newName.trim(), category: "عام", price: null, available: true, salesCount: 0, featured: false, description: "" }]);
    setNewName("");
  };

  return (
    <div className="panel" style={{ padding: 20 }}>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <input placeholder="اسم صنف جديد..." value={newName} onChange={(e) => setNewName(e.target.value)} />
        <button className="btn" onClick={addItem}>إضافة</button>
      </div>
      <div style={{ display: "grid", gap: 10 }}>
        {items.map((item, idx) => (
          <div key={item.id} className="panel-2" style={{ padding: 12, display: "flex", alignItems: "center", gap: 10 }}>
            <input
              style={{ flex: 2 }}
              value={item.name}
              onChange={(e) => { const c = [...items]; c[idx] = { ...item, name: e.target.value }; setItems(c); }}
              onBlur={() => save(items)}
            />
            <input
              style={{ flex: 1 }}
              placeholder="السعر"
              value={item.price ?? ""}
              onChange={(e) => { const c = [...items]; c[idx] = { ...item, price: e.target.value }; setItems(c); }}
              onBlur={() => save(items)}
            />
            <span
              className={`tag ${item.available ? "tag-on" : "tag-off"}`}
              style={{ cursor: "pointer" }}
              onClick={() => { const c = [...items]; c[idx] = { ...item, available: !item.available }; save(c); }}
            >
              {item.available ? "متوفر" : "غير متوفر"}
            </span>
            <button className="btn-danger" onClick={() => save(items.filter((_, i) => i !== idx))}>حذف</button>
          </div>
        ))}
        {items.length === 0 && <p style={{ color: "var(--ink-dim)" }}>ولا صنف مضاف بعد.</p>}
      </div>
    </div>
  );
}

// ---------------- Settings/Prompt panel ----------------
function SettingsPanel({ bot, api }) {
  const [settings, setSettings] = useState(null);
  useEffect(() => { api(`/api/bots/${bot.id}/settings`).then(setSettings); }, [bot.id]);
  if (!settings) return null;

  const save = async () => {
    await api(`/api/bots/${bot.id}/settings`, { method: "PUT", body: settings });
    alert("تم الحفظ ✅");
  };

  return (
    <div className="panel" style={{ padding: 20, display: "grid", gap: 14 }}>
      <div>
        <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>اسم الموظف (البوت)</label>
        <input value={settings.identity.employeeName} onChange={(e) => setSettings({ ...settings, identity: { ...settings.identity, employeeName: e.target.value } })} />
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <div style={{ flex: 1 }}>
          <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>وقت الفتح</label>
          <input type="time" value={settings.identity.openTime} onChange={(e) => setSettings({ ...settings, identity: { ...settings.identity, openTime: e.target.value } })} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>وقت الإغلاق</label>
          <input type="time" value={settings.identity.closeTime} onChange={(e) => setSettings({ ...settings, identity: { ...settings.identity, closeTime: e.target.value } })} />
        </div>
      </div>
      <div>
        <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>قوة البيع</label>
        <select value={settings.identity.salesPower} onChange={(e) => setSettings({ ...settings, identity: { ...settings.identity, salesPower: e.target.value } })}>
          <option value="light">خفيف</option>
          <option value="mid">متوسط</option>
          <option value="strong">قوي</option>
        </select>
      </div>
      <div>
        <label style={{ fontSize: 12, color: "var(--ink-dim)" }}>البرومبت الكامل</label>
        <textarea rows={10} style={{ fontFamily: "monospace" }} value={settings.prompt} onChange={(e) => setSettings({ ...settings, prompt: e.target.value })} />
      </div>
      <button className="btn" onClick={save}>حفظ</button>
    </div>
  );
}

// ---------------- Delivery fees panel ----------------
function DeliveryPanel({ bot, api }) {
  const [fees, setFees] = useState([]);
  const [area, setArea] = useState("");
  const [fee, setFee] = useState("");

  const load = () => api(`/api/bots/${bot.id}/delivery-fees`).then(setFees);
  useEffect(() => { load(); }, [bot.id]);

  const save = async (updated) => {
    setFees(updated);
    await api(`/api/bots/${bot.id}/delivery-fees`, { method: "PUT", body: updated });
  };

  const addRow = () => {
    if (!area.trim() || !fee) return;
    save([...fees, { area: area.trim(), fee: Number(fee) }]);
    setArea(""); setFee("");
  };

  return (
    <div className="panel" style={{ padding: 20 }}>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <input placeholder="اسم المنطقة" value={area} onChange={(e) => setArea(e.target.value)} />
        <input placeholder="السعر" style={{ width: 100 }} value={fee} onChange={(e) => setFee(e.target.value)} />
        <button className="btn" onClick={addRow}>إضافة</button>
      </div>
      <div style={{ maxHeight: 400, overflowY: "auto", display: "grid", gap: 6 }}>
        {fees.map((f, idx) => (
          <div key={idx} className="panel-2" style={{ padding: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>{f.area}</span>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <span style={{ color: "var(--amber)" }}>{f.fee} د.أ</span>
              <button className="btn-danger" onClick={() => save(fees.filter((_, i) => i !== idx))}>حذف</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------- Orders panel ----------------
function OrdersPanel({ bot, api }) {
  const [orders, setOrders] = useState([]);
  useEffect(() => { api(`/api/bots/${bot.id}/orders`).then(setOrders); }, [bot.id]);
  return (
    <div style={{ display: "grid", gap: 10 }}>
      {orders.length === 0 && <p style={{ color: "var(--ink-dim)" }}>ولا طلب لسا.</p>}
      {orders.map((o, idx) => (
        <div key={idx} className="panel" style={{ padding: 14 }}>
          <pre style={{ whiteSpace: "pre-wrap", fontSize: 13, margin: 0 }}>{JSON.stringify(o, null, 2)}</pre>
        </div>
      ))}
    </div>
  );
}

// ---------------- Employees panel ----------------
function EmployeesPanel({ api }) {
  const [employees, setEmployees] = useState([]);
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [role, setRole] = useState("orders");

  const load = () => api("/api/dashboard/employees").then(setEmployees).catch(() => {});
  useEffect(() => { load(); }, []);

  const invite = async () => {
    if (!name.trim() || !email.trim()) return;
    await api("/api/dashboard/employees", { method: "POST", body: { name, email, role } });
    setName(""); setEmail("");
    load();
  };

  return (
    <div style={{ display: "grid", gap: 16 }}>
      <div className="panel" style={{ padding: 20 }}>
        <div style={{ fontWeight: 700, marginBottom: 12 }}>إضافة موظف</div>
        <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
          <input placeholder="الاسم" value={name} onChange={(e) => setName(e.target.value)} />
          <input placeholder="الإيميل" dir="ltr" value={email} onChange={(e) => setEmail(e.target.value)} />
          <select value={role} onChange={(e) => setRole(e.target.value)} style={{ width: 160 }}>
            <option value="owner">مدير كامل</option>
            <option value="orders">موظف طلبات</option>
            <option value="viewer">مشاهدة فقط</option>
          </select>
          <button className="btn" onClick={invite}>دعوة</button>
        </div>
      </div>
      <div className="panel" style={{ padding: 20 }}>
        {employees.map((e) => (
          <div key={e.id} className="panel-2" style={{ padding: 10, marginBottom: 8, display: "flex", justifyContent: "space-between" }}>
            <span>{e.name} — {e.email}</span>
            <span className="tag tag-on">{e.role}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------- Main dashboard ----------------
function Dashboard({ employee, onLogout }) {
  const api = useApi();
  const [bots, setBots] = useState([]);
  const [selectedBotId, setSelectedBotId] = useState(null);
  const [tab, setTab] = useState("connection");
  const [newBotName, setNewBotName] = useState("");

  const refreshBots = useCallback(() => {
    api("/api/bots").then((list) => {
      setBots(list);
      if (!selectedBotId && list.length) setSelectedBotId(list[0].id);
    });
  }, [selectedBotId]);

  useEffect(() => { refreshBots(); }, []);

  const createBot = async () => {
    if (!newBotName.trim()) return;
    const bot = await api("/api/bots", { method: "POST", body: { name: newBotName.trim() } });
    setNewBotName("");
    refreshBots();
    setSelectedBotId(bot.id);
  };

  const selectedBot = bots.find((b) => b.id === selectedBotId);

  const tabs = [
    { id: "connection", label: "الربط والاتصال" },
    { id: "menu", label: "المنيو" },
    { id: "settings", label: "الإعدادات والبرومبت" },
    { id: "delivery", label: "التوصيل" },
    { id: "orders", label: "الطلبات" },
    { id: "employees", label: "الموظفين" },
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <aside className="panel" style={{ width: 260, borderRadius: 0, display: "flex", flexDirection: "column" }}>
        <div style={{ padding: 20, borderBottom: "1px solid var(--line)" }}>
          <div style={{ fontWeight: 700 }}><span style={{ color: "var(--amber)" }}>Saber</span> Jo Snack</div>
          <div style={{ fontSize: 12, color: "var(--ink-dim)" }}>مرحباً، {employee?.name}</div>
        </div>

        <div style={{ padding: 14, borderBottom: "1px solid var(--line)" }}>
          <div style={{ fontSize: 12, color: "var(--ink-dim)", marginBottom: 8 }}>البوتات</div>
          {bots.map((b) => (
            <div
              key={b.id}
              onClick={() => setSelectedBotId(b.id)}
              style={{
                padding: "8px 10px", borderRadius: 6, cursor: "pointer", marginBottom: 4,
                background: b.id === selectedBotId ? "var(--panel-2)" : "transparent",
                display: "flex", justifyContent: "space-between", alignItems: "center",
              }}
            >
              <span style={{ fontSize: 13 }}>{b.name}</span>
              <span className={`tag ${b.enabled === false ? "tag-off" : "tag-on"}`} style={{ fontSize: 10 }}>
                {b.enabled === false ? "موقوف" : "شغال"}
              </span>
            </div>
          ))}
          {employee?.role === "owner" && (
            <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
              <input placeholder="اسم بوت جديد" value={newBotName} onChange={(e) => setNewBotName(e.target.value)} style={{ fontSize: 12 }} />
              <button className="btn-ghost" onClick={createBot}>+</button>
            </div>
          )}
        </div>

        {selectedBot && (
          <nav style={{ flex: 1, paddingTop: 10 }}>
            {tabs.map((t) => (
              <button key={t.id} className={`nav-item ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
                {t.label}
              </button>
            ))}
          </nav>
        )}

        <div style={{ padding: 14, borderTop: "1px solid var(--line)" }}>
          <button className="btn-ghost" style={{ width: "100%" }} onClick={onLogout}>تسجيل خروج</button>
        </div>
      </aside>

      <main style={{ flex: 1, padding: 28, overflowY: "auto" }}>
        {!selectedBot && <p style={{ color: "var(--ink-dim)" }}>ولا بوت موجود لسا. أضف وحدة من الشريط الجانبي.</p>}
        {selectedBot && tab === "connection" && <ConnectionPanel bot={selectedBot} api={api} refreshBots={refreshBots} />}
        {selectedBot && tab === "menu" && <MenuPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "settings" && <SettingsPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "delivery" && <DeliveryPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "orders" && <OrdersPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "employees" && <EmployeesPanel api={api} />}
      </main>
    </div>
  );
}

// ---------------- Root ----------------
function App() {
  const [employee, setEmployee] = useState(() => {
    const raw = localStorage.getItem("sj_employee");
    return raw ? JSON.parse(raw) : null;
  });

  const logout = () => {
    localStorage.removeItem("sj_token");
    localStorage.removeItem("sj_employee");
    setEmployee(null);
  };

  if (!employee) return <Login onLoggedIn={setEmployee} />;
  return <Dashboard employee={employee} onLogout={logout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
