<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة تحكم Saber Jo Snack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root {
    --bg: #14161c; --panel: #1d2027; --panel-2: #242832; --line: #333743;
    --paper: #f6f0e4; --paper-line: #d9cfb8;
    --amber: #ff9f1c; --amber-dim: #c97c12; --olive: #93a86a; --red: #e2483d; --blue: #7aa0ff;
    --ink: #eee9de; --ink-dim: #9a9caa;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: Tahoma, "Segoe UI", sans-serif; }
  input, textarea, select { font-family: inherit; background: var(--panel-2); border: 1px solid var(--line); color: var(--ink); border-radius: 6px; padding: 8px 10px; font-size: 14px; width: 100%; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--amber); }
  ::placeholder { color: #6b6d78; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 20px; }
  .panel-2 { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
  .btn { background: var(--amber); color: #1a1200; font-weight: 700; border: none; border-radius: 8px; padding: 9px 16px; cursor: pointer; font-size: 14px; }
  .btn:hover { background: var(--amber-dim); }
  .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--ink); border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
  .btn-ghost:hover { border-color: var(--amber); color: var(--amber); }
  .btn-danger { background: rgba(226,72,61,0.15); color: var(--red); border: 1px solid rgba(226,72,61,0.4); border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
  .tag { font-size: 12px; padding: 3px 10px; border-radius: 999px; display: inline-block; }
  .tag-on { background: rgba(147,168,106,0.18); color: var(--olive); border: 1px solid rgba(147,168,106,0.4); }
  .tag-off { background: rgba(226,72,61,0.15); color: var(--red); border: 1px solid rgba(226,72,61,0.4); }
  .tag-pending { background: rgba(154,156,170,0.15); color: var(--ink-dim); border: 1px solid var(--line); }
  .chip { background: var(--panel-2); border: 1px solid var(--line); color: var(--ink-dim); border-radius: 999px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  .chip.active { background: var(--amber); border-color: var(--amber); color: #1a1200; font-weight: 700; }
  .preset { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 12px; cursor: pointer; }
  .preset.active { border-color: var(--amber); box-shadow: 0 0 0 1px var(--amber); }
  .switch { width: 40px; height: 22px; border-radius: 999px; position: relative; cursor: pointer; flex-shrink: 0; }
  .switch-off { background: var(--line); }
  .switch-on { background: var(--amber); }
  .switch-dot { position: absolute; top: 2px; width: 18px; height: 18px; border-radius: 999px; background: var(--ink); transition: right .15s; }
  .nav-item { display: block; width: 100%; text-align: right; background: none; border: none; color: var(--ink-dim); padding: 10px 16px; cursor: pointer; font-size: 14px; border-right: 3px solid transparent; }
  .nav-item.active { color: var(--amber); background: var(--panel-2); border-right-color: var(--amber); }
  .nav-item:hover:not(.active) { color: var(--ink); background: var(--panel-2); }
  .ticket { background: var(--paper); color: #241d10; border-radius: 4px; padding: 18px; box-shadow: 0 8px 20px rgba(0,0,0,.35); }
  .ticket-divider { border-top: 1px dashed var(--paper-line); padding-top: 10px; margin-top: 10px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .flex { display: flex; }
  .flexcol { display: flex; flex-direction: column; }
  .gap8 { gap: 8px; } .gap10 { gap: 10px; } .gap14 { gap: 14px; }
  .mb8 { margin-bottom: 8px; } .mb14 { margin-bottom: 14px; } .mb20 { margin-bottom: 20px; }
  label.small { font-size: 12px; color: var(--ink-dim); display: block; margin-bottom: 4px; }
  .branch-map { width: 100%; height: 320px; border-radius: 8px; border: 1px solid var(--line); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

function Switch({ on, onClick }) {
  return (
    <div className={`switch ${on ? "switch-on" : "switch-off"}`} onClick={onClick}>
      <div className="switch-dot" style={{ right: on ? 2 : 20 }} />
    </div>
  );
}

// مهلة قصوى لأي طلب من الداشبورد — قبل هاد الإصلاح، لو طلب عالق بالسيرفر (زي جلب جروبات واتساب لو
// السوكت "زومبي")، الزر بيضل عالق "جاري..." للأبد بلا أي رسالة خطأ، لأنو fetch بلا AbortController
// ما بينتهي إلا لما يرجع السيرفر رد فعلياً. هيك منضمن كل طلب يرجع خطأ واضح بعد وقت معقول بدل ما يعلق.
const API_TIMEOUT_MS = 30000;

function useApi() {
  const token = localStorage.getItem("sj_token");
  return useCallback(async (path, opts = {}) => {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), API_TIMEOUT_MS);
    let res;
    try {
      res = await fetch(path, {
        ...opts,
        signal: controller.signal,
        headers: { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(opts.headers || {}) },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
    } catch (err) {
      if (err.name === "AbortError") throw new Error(`الطلب أخذ وقت أطول من ${API_TIMEOUT_MS / 1000} ثانية بدون رد — جرب تاني.`);
      throw err;
    } finally {
      clearTimeout(timer);
    }
    if (res.status === 401) { localStorage.removeItem("sj_token"); window.location.reload(); throw new Error("انتهت الجلسة"); }
    const data = await res.json().catch(() => null);
    if (!res.ok) throw new Error(data?.error || "صار خطأ");
    return data;
  }, [token]);
}

function SetPassword({ token, onDone }) {
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [done, setDone] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError("");
    if (password.length < 6) return setError("كلمة المرور لازم تكون 6 أحرف على الأقل.");
    if (password !== confirm) return setError("كلمتا المرور مش متطابقتين.");
    try {
      const res = await fetch("/api/auth/reset-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token, newPassword: password }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "صار خطأ");
      setDone(true);
    } catch (err) { setError(err.message); }
  };

  if (done) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div className="panel" style={{ width: 340, textAlign: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 10, color: "var(--olive)" }}>تم تعيين كلمة المرور ✅</div>
          <button className="btn" style={{ width: "100%" }} onClick={onDone}>تسجيل الدخول الآن</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <form onSubmit={submit} className="panel" style={{ width: 340 }}>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 18, fontWeight: 700 }}>تعيين كلمة مرور جديدة</div>
          <div style={{ fontSize: 12, color: "var(--ink-dim)" }}>لحساب Saber Jo Snack</div>
        </div>
        <label className="small">كلمة المرور الجديدة</label>
        <div className="mb14"><input type="password" dir="ltr" value={password} onChange={(e) => setPassword(e.target.value)} required /></div>
        <label className="small">تأكيد كلمة المرور</label>
        <div className="mb14"><input type="password" dir="ltr" value={confirm} onChange={(e) => setConfirm(e.target.value)} required /></div>
        {error && <div style={{ color: "var(--red)", fontSize: 13, marginBottom: 12 }}>{error}</div>}
        <button className="btn" style={{ width: "100%" }}>حفظ كلمة المرور</button>
      </form>
    </div>
  );
}

function Login({ onLoggedIn }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState("login"); // login | forgot | sent

  const submit = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      const res = await fetch("/api/auth/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "فشل الدخول");
      localStorage.setItem("sj_token", data.token);
      localStorage.setItem("sj_employee", JSON.stringify(data.employee));
      onLoggedIn(data.employee);
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  const submitForgot = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      await fetch("/api/auth/forgot-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
      setMode("sent");
    } catch (err) { setError(err.message); } finally { setLoading(false); }
  };

  if (mode === "forgot" || mode === "sent") {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <form onSubmit={submitForgot} className="panel" style={{ width: 340 }}>
          <div style={{ textAlign: "center", marginBottom: 20, fontWeight: 700 }}>استرجاع كلمة المرور</div>
          {mode === "sent" ? (
            <p style={{ fontSize: 13, color: "var(--ink-dim)", textAlign: "center" }}>
              إذا الإيميل مسجل عندنا، لاقي رابط الاسترجاع من صاحب الحساب (الإيميل مش مفعّل لسا، فالرابط بيوصل يدوياً من المالك).
            </p>
          ) : (
            <>
              <label className="small">الإيميل</label>
              <div className="mb14"><input type="email" dir="ltr" value={email} onChange={(e) => setEmail(e.target.value)} required /></div>
              <button className="btn" style={{ width: "100%" }} disabled={loading}>إرسال رابط الاسترجاع</button>
            </>
          )}
          <div style={{ textAlign: "center", marginTop: 14 }}>
            <span style={{ color: "var(--amber)", fontSize: 13, cursor: "pointer" }} onClick={() => setMode("login")}>رجوع لتسجيل الدخول</span>
          </div>
        </form>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <form onSubmit={submit} className="panel" style={{ width: 340 }}>
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div style={{ fontSize: 22, fontWeight: 700 }}><span style={{ color: "var(--amber)" }}>Saber</span> Jo Snack</div>
          <div style={{ fontSize: 12, color: "var(--ink-dim)" }}>لوحة تحكم البوت</div>
        </div>
        <label className="small">الإيميل</label>
        <div className="mb14"><input type="email" dir="ltr" value={email} onChange={(e) => setEmail(e.target.value)} required /></div>
        <label className="small">كلمة المرور</label>
        <div className="mb8"><input type="password" dir="ltr" value={password} onChange={(e) => setPassword(e.target.value)} required /></div>
        <div style={{ textAlign: "left", marginBottom: 14 }}>
          <span style={{ color: "var(--amber)", fontSize: 12, cursor: "pointer" }} onClick={() => setMode("forgot")}>نسيت كلمة المرور؟</span>
        </div>
        {error && <div style={{ color: "var(--red)", fontSize: 13, marginBottom: 12 }}>{error}</div>}
        <button className="btn" style={{ width: "100%" }} disabled={loading}>{loading ? "..." : "دخول"}</button>
      </form>
    </div>
  );
}

function ConnectionsPanel({ bot, api, refreshBots }) {
  const [qr, setQr] = useState(null);
  const [status, setStatus] = useState("connecting");
  const [conn, setConn] = useState(null);
  const [saving, setSaving] = useState(false);
  const [meta, setMeta] = useState(null);
  const [savingMeta, setSavingMeta] = useState(false);
  const [fbPages, setFbPages] = useState(null); // null = ما في اختيار معلّق، array = في صفحات جاهزة يلي المستخدم يختار منها
  const [fbLoading, setFbLoading] = useState(false);
  const [fbError, setFbError] = useState("");
  const [showManual, setShowManual] = useState(false);
  const [channelEnabled, setChannelEnabled] = useState({ whatsapp: true, messenger: true, instagram: true, ...(bot.channelEnabled || {}) });
  useEffect(() => { setChannelEnabled({ whatsapp: true, messenger: true, instagram: true, ...(bot.channelEnabled || {}) }); }, [bot.id, bot.channelEnabled]);

  const toggleChannel = async (key) => {
    const updated = { ...channelEnabled, [key]: !channelEnabled[key] };
    setChannelEnabled(updated);
    await api(`/api/bots/${bot.id}/channels`, { method: "PUT", body: { channelEnabled: updated } });
  };

  useEffect(() => {
    let stop = false;
    const poll = () => api(`/api/bots/${bot.id}/qr`).then((d) => { if (!stop) { setStatus(d.status); setQr(d.qrImage); } }).catch(() => {});
    poll();
    const t = setInterval(poll, 4000);
    return () => { stop = true; clearInterval(t); };
  }, [bot.id]);

  useEffect(() => { api(`/api/bots/${bot.id}/connection`).then(setConn); }, [bot.id]);
  useEffect(() => { api(`/api/bots/${bot.id}/meta-connection`).then(setMeta); }, [bot.id]);

  // لو رجعنا من فيسبوك لتوّنا (metaConnected=<botId> أو metaError=...) نجيب قائمة الصفحات المعلّقة أو نعرض الخطأ
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const connectedBotId = params.get("metaConnected");
    const err = params.get("metaError");
    if (err) {
      setFbError("صار خطأ أثناء تسجيل الدخول بفيسبوك: " + err);
      window.history.replaceState({}, "", window.location.pathname);
      return;
    }
    if (connectedBotId === bot.id) {
      api(`/api/bots/${bot.id}/facebook/pages`).then((pages) => setFbPages(pages));
      window.history.replaceState({}, "", window.location.pathname);
    }
  }, [bot.id]);

  const toggleBot = async () => { await api(`/api/bots/${bot.id}/${bot.enabled === false ? "start" : "stop"}`, { method: "POST" }); refreshBots(); };
  const saveConnection = async () => { setSaving(true); try { await api(`/api/bots/${bot.id}/connection`, { method: "PUT", body: conn }); alert("تم الحفظ ✅"); } finally { setSaving(false); } };
  const saveMeta = async () => { setSavingMeta(true); try { await api(`/api/bots/${bot.id}/meta-connection`, { method: "PUT", body: meta }); alert("تم الحفظ ✅"); } finally { setSavingMeta(false); } };
  const setMessenger = (patch) => setMeta({ ...meta, messenger: { ...meta.messenger, ...patch } });
  const setInstagram = (patch) => setMeta({ ...meta, instagram: { ...meta.instagram, ...patch } });

  const loginWithFacebook = async () => {
    setFbLoading(true); setFbError("");
    try {
      const { url } = await api(`/api/bots/${bot.id}/facebook/login-url`);
      window.location.href = url; // تنقل صفحة كامل لموافقة فيسبوك، وبيرجعنا هون تلقائياً بعدها
    } catch (e) {
      setFbError(e.message);
      setFbLoading(false);
    }
  };

  const unlinkMessenger = async () => {
    if (!confirm('متأكد إنك بدك تلغي ربط ماسنجر عن هاد البوت؟')) return;
    const updated = await api(`/api/bots/${bot.id}/meta-connection`, { method: "PUT", body: { messenger: { enabled: false, pageId: "", pageName: "", pageAccessToken: "" } } });
    setMeta(updated);
  };
  const unlinkInstagram = async () => {
    if (!confirm('متأكد إنك بدك تلغي ربط انستجرام عن هاد البوت؟')) return;
    const updated = await api(`/api/bots/${bot.id}/meta-connection`, { method: "PUT", body: { instagram: { enabled: false, igId: "", igUsername: "", pageAccessToken: "" } } });
    setMeta(updated);
  };

  const pickPage = async (pageId) => {
    setFbLoading(true); setFbError("");
    try {
      const { webhookSubscribeWarning, ...updated } = await api(`/api/bots/${bot.id}/facebook/select-page`, { method: "POST", body: { pageId } });
      setMeta(updated);
      setFbPages(null);
      if (webhookSubscribeWarning) setFbError(webhookSubscribeWarning);
    } catch (e) {
      setFbError(e.message);
    } finally {
      setFbLoading(false);
    }
  };

  const resubscribeWebhook = async () => {
    setFbLoading(true); setFbError("");
    try {
      await api(`/api/bots/${bot.id}/facebook/resubscribe-webhook`, { method: "POST" });
      alert("تم تفعيل استقبال الرسائل من جديد ✅");
    } catch (e) {
      setFbError(e.message);
    } finally {
      setFbLoading(false);
    }
  };

  if (!conn) return null;
  const provider = conn.waProvider || "";
  const creds = conn.waCredentials || {};
  const setCred = (k, v) => setConn({ ...conn, waCredentials: { ...creds, [k]: v } });

  return (
    <div className="flexcol gap14">
      <div className="panel flex" style={{ alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontWeight: 700, marginBottom: 6 }}>حالة بوت "{bot.name}"</div>
          <span className={`tag ${bot.enabled === false ? "tag-off" : "tag-on"}`}>{bot.enabled === false ? "موقوف" : "شغال"}</span>
        </div>
        <button className={bot.enabled === false ? "btn" : "btn-danger"} onClick={toggleBot}>{bot.enabled === false ? "▶ تشغيل البوت" : "⏸ إيقاف البوت"}</button>
      </div>

      <div className="panel">
        <div style={{ fontWeight: 700, marginBottom: 4 }}>تشغيل/إيقاف كل منصة لحالها</div>
        <p style={{ fontSize: 12, color: "var(--ink-dim)", marginBottom: 12 }}>مثلاً تقدر تخلي واتساب شغال وتوقف انستجرام بس، من دون ما توقف البوت كامل من فوق.</p>
        <div className="grid3">
          {[["whatsapp", "💬 واتساب"], ["messenger", "📨 ماسنجر"], ["instagram", "📷 انستجرام"]].map(([key, label]) => (
            <div key={key} className="panel-2 flex" style={{ justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 13 }}>{label}</span>
              <Switch on={channelEnabled[key] !== false} onClick={() => toggleChannel(key)} />
            </div>
          ))}
        </div>
      </div>

      <div className="panel" style={{ textAlign: "center" }}>
        <div style={{ fontWeight: 700, marginBottom: 12 }}>ربط واتساب مباشر (رمز QR)</div>
        {provider !== "selfhosted" ? (
          <div>
            <p style={{ fontSize: 13, color: "var(--ink-dim)", marginBottom: 12 }}>
              هاد ربط مباشر برقم واتساب من جوالك (متل واتساب ويب) بدون أي API خارجي أو اشتراك. لما تفعله بيصير هو طريقة إرسال واستقبال الرسائل لهاد البوت.
            </p>
            <button
              className="btn"
              disabled={saving}
              onClick={async () => {
                setSaving(true);
                try {
                  const updated = { ...conn, waProvider: "selfhosted" };
                  await api(`/api/bots/${bot.id}/connection`, { method: "PUT", body: updated });
                  setConn(updated);
                } finally {
                  setSaving(false);
                }
              }}
            >
              {saving ? "..." : "فعّل الربط المباشر (QR)"}
            </button>
          </div>
        ) : (
          <div>
            {status === "connected" ? <div style={{ color: "var(--olive)" }}>متصل بواتساب ✅</div>
              : qr ? (<div><img src={qr} style={{ width: 220, height: 220 }} /><p style={{ fontSize: 13, color: "var(--ink-dim)" }}>افتح واتساب على جوالك ← الأجهزة المرتبطة ← ربط جهاز، وامسح الرمز.</p></div>)
              : <p style={{ color: "var(--ink-dim)" }}>عم نجهز رمز QR... (لو ضلت شوي وما طلع شي، دوس الزر تحت)</p>}
            <button
              className="btn-ghost"
              style={{ marginTop: 10, fontSize: 12 }}
              disabled={saving}
              onClick={async () => {
                setSaving(true);
                try {
                  await api(`/api/bots/${bot.id}/whatsapp-restart`, { method: "POST" });
                  setQr(null); setStatus("connecting");
                } catch (e) {
                  alert(e.message);
                } finally {
                  setSaving(false);
                }
              }}
            >
              {saving ? "..." : "🔄 إعادة تشغيل الاتصال"}
            </button>
          </div>
        )}
      </div>

      <div className="panel">
        <div style={{ fontWeight: 700, marginBottom: 4 }}>إعدادات الربط</div>
        <p style={{ fontSize: 12, color: "var(--ink-dim)", marginBottom: 14 }}>حدد المزود والمفاتيح من هون بدل Render.</p>
        <label className="small">المزود</label>
        <div className="mb14">
          <select value={provider} onChange={(e) => setConn({ ...conn, waProvider: e.target.value })}>
            <option value="">افتراضي السيرفر (.env)</option>
            <option value="selfhosted">اتصال مباشر</option>
            <option value="wasender">WasenderAPI</option>
            <option value="ultramsg">UltraMsg</option>
            <option value="green">Green API</option>
            <option value="cloud">Meta Cloud API (الرسمي)</option>
          </select>
        </div>
        {provider === "wasender" && (<div className="mb14"><label className="small">WASENDER API KEY</label><input dir="ltr" value={creds.wasenderApiKey || ""} onChange={(e) => setCred("wasenderApiKey", e.target.value)} /></div>)}
        {provider === "ultramsg" && (<>
          <div className="mb8"><label className="small">Instance ID</label><input dir="ltr" value={creds.ultramsgInstanceId || ""} onChange={(e) => setCred("ultramsgInstanceId", e.target.value)} /></div>
          <div className="mb14"><label className="small">Token</label><input dir="ltr" value={creds.ultramsgToken || ""} onChange={(e) => setCred("ultramsgToken", e.target.value)} /></div>
        </>)}
        {provider === "green" && (<>
          <div className="mb8"><label className="small">Instance ID</label><input dir="ltr" value={creds.greenApiInstanceId || ""} onChange={(e) => setCred("greenApiInstanceId", e.target.value)} /></div>
          <div className="mb14"><label className="small">Token</label><input dir="ltr" value={creds.greenApiToken || ""} onChange={(e) => setCred("greenApiToken", e.target.value)} /></div>
        </>)}
        {provider === "cloud" && (<>
          <div className="mb8"><label className="small">Phone Number ID</label><input dir="ltr" value={creds.whatsappPhoneNumberId || ""} onChange={(e) => setCred("whatsappPhoneNumberId", e.target.value)} /></div>
          <div className="mb14"><label className="small">Access Token</label><input dir="ltr" value={creds.whatsappToken || ""} onChange={(e) => setCred("whatsappToken", e.target.value)} /></div>
        </>)}
        <button className="btn" onClick={saveConnection} disabled={saving}>{saving ? "..." : "حفظ إعدادات الربط"}</button>
      </div>

      {meta && (
        <div className="panel">
          <div style={{ fontWeight: 700, marginBottom: 4 }}>منصات ميتا (ماسنجر وانستجرام)</div>
          <p style={{ fontSize: 12, color: "var(--ink-dim)", marginBottom: 14 }}>سجل دخول بحساب فيسبوك تبع صفحتك واختر الصفحة من القائمة — بيتحفظ كل شي تلقائياً بدون ما تحتاج تلصق أي توكن.</p>

          {fbError && <div style={{ background: "#fdecea", color: "#611a15", padding: 10, borderRadius: 6, fontSize: 13, marginBottom: 12 }}>{fbError}</div>}

          {!fbPages && (
            <div className="flex gap8" style={{ marginBottom: 14, alignItems: "center" }}>
              <button className="btn" onClick={loginWithFacebook} disabled={fbLoading}>
                {fbLoading ? "..." : "🔵 تسجيل الدخول عبر فيسبوك"}
              </button>
              <button
                className="btn-ghost"
                style={{ fontSize: 12 }}
                disabled={fbLoading}
                onClick={async () => { setFbLoading(true); try { const pages = await api(`/api/bots/${bot.id}/facebook/pages`); setFbPages(pages); } finally { setFbLoading(false); } }}
              >
                عرض الصفحات من آخر تسجيل دخول
              </button>
            </div>
          )}

          {fbPages && (
            <div style={{ borderTop: "1px solid var(--line)", paddingTop: 12, marginBottom: 14 }}>
              <div style={{ fontWeight: 600, marginBottom: 8 }}>اختر الصفحة يلي بدك تربطها بهاد البوت:</div>
              {fbPages.length === 0 && <p style={{ fontSize: 13, color: "var(--ink-dim)" }}>ما لقينا أي صفحة فيسبوك أنت أدمن فيها بهاد الحساب.</p>}
              <div className="flexcol gap8">
                {fbPages.map((p) => (
                  <div key={p.id} className="flex" style={{ justifyContent: "space-between", alignItems: "center", border: "1px solid var(--line)", borderRadius: 6, padding: "8px 10px" }}>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 13 }}>{p.name}</div>
                      {p.hasInstagram && <div style={{ fontSize: 11, color: "var(--ink-dim)" }}>📷 مربوطة بحساب انستجرام: {p.instagramUsername || p.id}</div>}
                    </div>
                    <button className="btn" disabled={fbLoading} onClick={() => pickPage(p.id)}>ربط هاي الصفحة</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ borderTop: "1px solid var(--line)", paddingTop: 12, marginBottom: 6 }}>
            <div className="flex" style={{ justifyContent: "space-between", alignItems: "center" }}>
              <span className="flex gap8" style={{ alignItems: "center" }}>
                <span style={{ fontWeight: 600 }}>💬 ماسنجر</span>
                <span className={`tag ${meta.messenger?.enabled ? "tag-on" : "tag-off"}`} style={{ fontSize: 10 }}>{meta.messenger?.enabled ? "متصل" : "غير متصل"}</span>
              </span>
              <span className="flex gap8" style={{ alignItems: "center" }}>
                {meta.messenger?.enabled && <span style={{ fontSize: 12, color: "var(--ink-dim)" }}>{meta.messenger?.pageName || meta.messenger?.pageId}</span>}
                {meta.messenger?.enabled && <button className="btn-ghost" style={{ fontSize: 11, padding: "3px 8px" }} disabled={fbLoading} onClick={resubscribeWebhook}>إعادة تفعيل استقبال الرسائل</button>}
                {meta.messenger?.enabled && <button className="btn-ghost" style={{ fontSize: 11, padding: "3px 8px" }} onClick={unlinkMessenger}>إلغاء الربط</button>}
              </span>
            </div>
            <div className="flex" style={{ justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
              <span className="flex gap8" style={{ alignItems: "center" }}>
                <span style={{ fontWeight: 600 }}>📷 انستجرام</span>
                <span className={`tag ${meta.instagram?.enabled ? "tag-on" : "tag-off"}`} style={{ fontSize: 10 }}>{meta.instagram?.enabled ? "متصل" : "غير متصل"}</span>
              </span>
              <span className="flex gap8" style={{ alignItems: "center" }}>
                {meta.instagram?.enabled && <span style={{ fontSize: 12, color: "var(--ink-dim)" }}>{meta.instagram?.igUsername || meta.instagram?.igId}</span>}
                {meta.instagram?.enabled && <button className="btn-ghost" style={{ fontSize: 11, padding: "3px 8px" }} onClick={unlinkInstagram}>إلغاء الربط</button>}
              </span>
            </div>
          </div>

          <details style={{ marginTop: 10 }}>
            <summary style={{ cursor: "pointer", fontSize: 12, color: "var(--ink-dim)" }} onClick={(e) => { e.preventDefault(); setShowManual(!showManual); }}>
              إعداد يدوي متقدم (لصق Page ID / Token يدوياً)
            </summary>
            {showManual && (<div style={{ marginTop: 10 }}>
              <div style={{ borderTop: "1px solid var(--line)", paddingTop: 12, marginBottom: 14 }}>
                <label className="flex gap8" style={{ alignItems: "center", marginBottom: 8 }}>
                  <input type="checkbox" checked={!!meta.messenger?.enabled} onChange={(e) => setMessenger({ enabled: e.target.checked })} />
                  <span style={{ fontWeight: 600 }}>💬 ماسنجر (Messenger)</span>
                </label>
                {meta.messenger?.enabled && (<>
                  <div className="mb8"><label className="small">Page ID</label><input dir="ltr" value={meta.messenger?.pageId || ""} onChange={(e) => setMessenger({ pageId: e.target.value })} /></div>
                  <div className="mb14"><label className="small">Page Access Token</label><input dir="ltr" value={meta.messenger?.pageAccessToken || ""} onChange={(e) => setMessenger({ pageAccessToken: e.target.value })} /></div>
                </>)}
              </div>

              <div style={{ borderTop: "1px solid var(--line)", paddingTop: 12, marginBottom: 14 }}>
                <label className="flex gap8" style={{ alignItems: "center", marginBottom: 8 }}>
                  <input type="checkbox" checked={!!meta.instagram?.enabled} onChange={(e) => setInstagram({ enabled: e.target.checked })} />
                  <span style={{ fontWeight: 600 }}>📷 انستجرام (Instagram)</span>
                </label>
                {meta.instagram?.enabled && (<>
                  <div className="mb8"><label className="small">Instagram Business Account ID</label><input dir="ltr" value={meta.instagram?.igId || ""} onChange={(e) => setInstagram({ igId: e.target.value })} /></div>
                  <div className="mb14"><label className="small">Access Token</label><input dir="ltr" value={meta.instagram?.pageAccessToken || ""} onChange={(e) => setInstagram({ pageAccessToken: e.target.value })} /></div>
                </>)}
              </div>

              <button className="btn" onClick={saveMeta} disabled={savingMeta}>{savingMeta ? "..." : "حفظ ربط ميتا"}</button>
            </div>)}
          </details>
        </div>
      )}
    </div>
  );
}

const TONES = ["ودود","احترافي","مقنع","داعم","حازم","هادئ","متحمس","ذكي","متعاطف","عفوي"];
const EMOJI_LEVELS = [["high","كثير"],["mid","متوازن"],["low","قليل"],["none","بدون"]];
const SALES_POWER = [["light","خفيف","يسجل الطلب بس"],["mid","متوسط","يقترح أحياناً"],["strong","قوي","يزيد قيمة كل طلب"]];
const DIALECTS = ["الأردن","العراق","مصر","سوريا","لبنان","فلسطين","الخليج","عام (فصحى مبسطة)"];

function StylePanel({ bot, api, refreshBots }) {
  const [s, setS] = useState(null);
  const [groups, setGroups] = useState(null);
  const [groupsErr, setGroupsErr] = useState("");
  const [loadingGroups, setLoadingGroups] = useState(false);
  const [syncingPos, setSyncingPos] = useState(false);

  useEffect(() => {
    api(`/api/bots/${bot.id}/settings`).then((data) => {
      // نضيف قيم افتراضية لأي بوت قديم ما عندوش هاي الحقول محفوظة أصلاً
      setS({
        ...data,
        identity: { open24h: false, businessName: "", businessAddress: "", businessType: "", supportPhone: "", ...data.identity },
        timing: { debounceSec: 6, minDelaySec: 1.2, maxDelaySec: 6, ...(data.timing || {}) },
        orderDestination: { mode: "dashboard", target: "", targetName: "", ...(data.orderDestination || {}) },
      });
    });
  }, [bot.id]);
  if (!s) return null;

  const save = async () => { await api(`/api/bots/${bot.id}/settings`, { method: "PUT", body: s }); alert("تم الحفظ ✅"); };
  const toggleTone = (t) => setS({ ...s, style: { ...s.style, tones: s.style.tones.includes(t) ? s.style.tones.filter(x => x !== t) : [...s.style.tones, t] } });

  const togglePosSync = async () => {
    await api(`/api/bots/${bot.id}/pos-sync`, { method: "PUT", body: { enabled: !bot.posSync?.enabled } });
    refreshBots();
  };
  const runPosSyncNow = async () => {
    setSyncingPos(true);
    try {
      const r = await api(`/api/bots/${bot.id}/pos-sync/run`, { method: "POST" });
      alert(`✓ تحديث ناجح: ${r.itemsSynced} صنف، ${r.codesSynced} كود خصم.`);
    } catch (err) {
      alert("✗ فشل التحديث: " + err.message);
    } finally {
      setSyncingPos(false);
      refreshBots();
    }
  };

  const loadGroups = async () => {
    setLoadingGroups(true); setGroupsErr("");
    try {
      const list = await api(`/api/bots/${bot.id}/whatsapp-groups`);
      setGroups(list);
    } catch (err) {
      setGroupsErr(err.message || "فشل جلب قائمة الجروبات.");
    } finally {
      setLoadingGroups(false);
    }
  };

  return (
    <div className="flexcol gap14">
      <div className="panel">
        <div style={{ fontWeight: 700, marginBottom: 4 }}>الهوية الأساسية</div>
        <div className="small" style={{ color: "var(--ink-dim)", marginBottom: 14 }}>اسم الشركة/المحل وعنوانه مهمين — البوت بيعرّف نفسه فيهم للزبون. لو تركتهم فاضيين، بيستخدم افتراضياً بيانات Saber Jo Snack.</div>
        <div className="grid2 mb14">
          <div><label className="small">اسم الموظف (البوت)</label><input value={s.identity.employeeName} onChange={(e) => setS({ ...s, identity: { ...s.identity, employeeName: e.target.value } })} /></div>
          <div><label className="small">اسم الشركة/المحل</label><input placeholder="مثال: تريندي" value={s.identity.businessName} onChange={(e) => setS({ ...s, identity: { ...s.identity, businessName: e.target.value } })} /></div>
        </div>
        <div className="grid2 mb14">
          <div><label className="small">العنوان</label><input placeholder="مثال: عمّان، جبل الحسين" value={s.identity.businessAddress} onChange={(e) => setS({ ...s, identity: { ...s.identity, businessAddress: e.target.value } })} /></div>
          <div><label className="small">طبيعة النشاط</label><input placeholder="مثال: توصيل منتجات بس، بدون فرع" value={s.identity.businessType} onChange={(e) => setS({ ...s, identity: { ...s.identity, businessType: e.target.value } })} /></div>
        </div>
        <div className="grid2 mb14">
          <div><label className="small">رقم السنتر/الدعم</label><input placeholder="مثال: 0796893403" value={s.identity.supportPhone} onChange={(e) => setS({ ...s, identity: { ...s.identity, supportPhone: e.target.value } })} /></div>
        </div>
        <div className="grid2 mb14">
          <div>
            <div className="flex" style={{ justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <label className="small" style={{ margin: 0 }}>مفتوح 24 ساعة</label>
              <Switch on={!!s.identity.open24h} onClick={() => setS({ ...s, identity: { ...s.identity, open24h: !s.identity.open24h } })} />
            </div>
            {!s.identity.open24h && (
              <>
                <div className="flex gap8">
                  <div style={{ flex: 1 }}><label className="small">فتح</label><input type="time" value={s.identity.openTime} onChange={(e) => setS({ ...s, identity: { ...s.identity, openTime: e.target.value } })} /></div>
                  <div style={{ flex: 1 }}><label className="small">إغلاق</label><input type="time" value={s.identity.closeTime} onChange={(e) => setS({ ...s, identity: { ...s.identity, closeTime: e.target.value } })} /></div>
                </div>
                <div className="small" style={{ color: "var(--ink-dim)", marginTop: 4 }}>لو وقت الإغلاق قبل وقت الفتح (مثلاً فتح 3 العصر وسكر 4:30 فجراً)، البوت بيفهمها تلقائياً إنها بتمتد لبعد نص الليل لليوم التاني — بدون أي إعداد إضافي.</div>
              </>
            )}
          </div>
        </div>
        <div className="mb14">
          <label className="small">لهجة الردود (نص)</label>
          <select value={s.identity.dialect || "الأردن"} onChange={(e) => setS({ ...s, identity: { ...s.identity, dialect: e.target.value } })}>
            {DIALECTS.map((d) => <option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <label className="small">قوة البيع</label>
        <div className="grid3">
          {SALES_POWER.map(([id, label, hint]) => (
            <div key={id} className={`preset ${s.identity.salesPower === id ? "active" : ""}`} onClick={() => setS({ ...s, identity: { ...s.identity, salesPower: id } })}>
              <div style={{ fontWeight: 700, fontSize: 14, color: s.identity.salesPower === id ? "var(--amber)" : "var(--ink)" }}>{label}</div>
              <div style={{ fontSize: 12, color: "var(--ink-dim)" }}>{hint}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="panel">
        <div style={{ fontWeight: 700, marginBottom: 4 }}>سرعة الرد</div>
        <div className="small" style={{ color: "var(--ink-dim)", marginBottom: 14 }}>تتحكم هاي القيم بكل شي متعلق بسرعة رد البوت — كل قيمة بالثواني.</div>

        <label className="small">مدة انتظار تجميع الرسائل المتتالية: {s.timing.debounceSec} ثانية</label>
        <div className="small" style={{ color: "var(--ink-dim)", marginBottom: 4 }}>لو الزبون بعت كذا رسالة ورا بعض بفترة قصيرة، البوت بيستنى هاد الوقت من آخر رسالة قبل ما يرد عليهم كلهم مرة وحدة.</div>
        <input type="range" min="1" max="20" step="1" value={s.timing.debounceSec} onChange={(e) => setS({ ...s, timing: { ...s.timing, debounceSec: Number(e.target.value) } })} style={{ accentColor: "var(--amber)", marginBottom: 14 }} />

        <label className="small">أقل مدة قبل الرد: {s.timing.minDelaySec} ثانية</label>
        <div className="small" style={{ color: "var(--ink-dim)", marginBottom: 4 }}>أقصر وقت "تفكير وكتابة" قبل ما يبعت البوت أي رد (حتى لو الرد قصير جداً).</div>
        <input type="range" min="0" max="10" step="0.1" value={s.timing.minDelaySec} onChange={(e) => setS({ ...s, timing: { ...s.timing, minDelaySec: Number(e.target.value) } })} style={{ accentColor: "var(--amber)", marginBottom: 14 }} />

        <label className="small">أقصى مدة قبل الرد: {s.timing.maxDelaySec} ثانية</label>
        <div className="small" style={{ color: "var(--ink-dim)", marginBottom: 4 }}>أطول وقت ممكن ينتظره البوت قبل الإرسال، حتى لو الرد طويل جداً.</div>
        <input type="range" min="1" max="20" step="0.5" value={s.timing.maxDelaySec} onChange={(e) => setS({ ...s, timing: { ...s.timing, maxDelaySec: Math.max(s.timing.minDelaySec, Number(e.target.value)) } })} style={{ accentColor: "var(--amber)" }} />
      </div>

      <div className="panel">
        <div style={{ fontWeight: 700, marginBottom: 10 }}>نبرة الرد</div>
        <div className="flex gap8" style={{ flexWrap: "wrap" }}>
          {TONES.map((t) => <div key={t} className={`chip ${s.style.tones.includes(t) ? "active" : ""}`} onClick={() => toggleTone(t)}>{t}</div>)}
        </div>
      </div>

      <div className="panel">
        <div style={{ fontWeight: 700, marginBottom: 10 }}>الرموز التعبيرية وطول الرد</div>
        <div className="grid3 mb14">
          {EMOJI_LEVELS.map(([id, label]) => (
            <div key={id} className={`preset ${s.style.emojiLevel === id ? "active" : ""}`} style={{ textAlign: "center" }} onClick={() => setS({ ...s, style: { ...s.style, emojiLevel: id } })}>
              <div style={{ fontWeight: 700, color: s.style.emojiLevel === id ? "var(--amber)" : "var(--ink)" }}>{label}</div>
            </div>
          ))}
        </div>
        <label className="small">طول الرد (بالحرف): {s.style.responseLength}</label>
        <input type="range" min="50" max="1000" step="10" value={s.style.responseLength} onChange={(e) => setS({ ...s, style: { ...s.style, responseLength: Number(e.target.value) } })} style={{ accentColor: "var(--amber)" }} />
      </div>

      <div className="panel">
        <div className="flex" style={{ justifyContent: "space-between", marginBottom: 4 }}>
          <div style={{ fontWeight: 700 }}>الرد الصوتي</div>
          <Switch on={s.voice.enabled} onClick={() => setS({ ...s, voice: { ...s.voice, enabled: !s.voice.enabled } })} />
        </div>
        {s.voice.enabled && (
          <div className="grid2" style={{ marginTop: 10 }}>
            <div><label className="small">اللهجة</label><input value={s.voice.dialect} onChange={(e) => setS({ ...s, voice: { ...s.voice, dialect: e.target.value } })} /></div>
            <div><label className="small">اسم الصوت</label><input value={s.voice.voiceName} onChange={(e) => setS({ ...s, voice: { ...s.voice, voiceName: e.target.value } })} /></div>
          </div>
        )}
      </div>

      <div className="panel">
        <div className="flex" style={{ justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
          <div style={{ fontWeight: 700 }}>مزامنة المنيو من الكاشير (POS)</div>
          <Switch on={Boolean(bot.posSync?.enabled)} onClick={togglePosSync} />
        </div>
        <div className="small" style={{ color: "var(--ink-dim)", marginBottom: 10 }}>لما تكون مفعّلة، المنيو (الأصناف، الأسعار، التوفر) وأكواد الخصم بتنسحب تلقائياً من نظام الكاشير كل ساعة. صفة "صنف مميز" يلي تحددها إنت يدوياً بتبويب "المنيو" بتضل محفوظة حتى بعد كل تحديث.</div>
        <div className="flex gap8" style={{ alignItems: "center" }}>
          <button className="btn-ghost" disabled={syncingPos} onClick={runPosSyncNow}>{syncingPos ? "جاري التحديث..." : "🔄 تحديث الآن"}</button>
          {bot.posSync?.lastSyncAt && <span className="small" style={{ color: "var(--ink-dim)" }}>آخر تحديث: {new Date(bot.posSync.lastSyncAt).toLocaleString("ar-JO")}</span>}
        </div>
        {bot.posSync?.lastError && <div style={{ fontSize: 12, color: "var(--red, #d9534f)", marginTop: 8 }}>آخر خطأ: {bot.posSync.lastError}</div>}
      </div>

      <div className="panel flex" style={{ justifyContent: "space-between" }}>
        <div style={{ fontWeight: 700 }}>إرسال صور الأصناف تلقائياً</div>
        <Switch on={s.sendImagesAutomatically} onClick={() => setS({ ...s, sendImagesAutomatically: !s.sendImagesAutomatically })} />
      </div>

      <div className="panel">
        <div style={{ fontWeight: 700, marginBottom: 4 }}>وجهة الطلبات</div>
        <div className="small" style={{ color: "var(--ink-dim)", marginBottom: 14 }}>لما البوت يأكد طلب مع زبون، وين بدك ينوصل؟ الطلب دايماً بيتسجل بتبويب "الطلبات" — هاي بس تتحكم إذا كمان ينبعت لجروب واتساب.</div>

        <div className="grid2 mb14">
          <div className={`preset ${s.orderDestination.mode !== "whatsapp_group" ? "active" : ""}`} onClick={() => setS({ ...s, orderDestination: { ...s.orderDestination, mode: "dashboard" } })}>
            <div style={{ fontWeight: 700, fontSize: 13, color: s.orderDestination.mode !== "whatsapp_group" ? "var(--amber)" : "var(--ink)" }}>لوحة التحكم بس</div>
            <div style={{ fontSize: 11, color: "var(--ink-dim)" }}>الطلب بيظهر بتبويب "الطلبات" فقط</div>
          </div>
          <div className={`preset ${s.orderDestination.mode === "whatsapp_group" ? "active" : ""}`} onClick={() => setS({ ...s, orderDestination: { ...s.orderDestination, mode: "whatsapp_group" } })}>

const GENERAL_AREAS_KEY = "__general__"; // مناطق مش مربوطة بفرع معيّن (branchId فاضي) — تنطبق بغض النظر عن الفرع

// بيحول محتوى ملف CSV/نص لقائمة {area, fee} — يدعم فاصلة أو فاصلة منقوطة أو تاب بين اسم المنطقة والسعر.
// أي سطر مش قابل للتحويل (زي سطر عنوان الأعمدة "المنطقة,السعر") بينترشح تلقائياً لأنو السعر مش رقم صحيح.
function parseAreasFile(text) {
  return text
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line) => {
      const parts = line.split(/[,،;\t]/).map((p) => p.trim());
      if (parts.length < 2) return null;
      const area = parts[0];
      const fee = Number(parts[1].replace(",", "."));
      if (!area || Number.isNaN(fee)) return null;
      return { area, fee };
    })
    .filter(Boolean);
}

function downloadAreasTemplate() {
  const csv = "المنطقة,السعر\nشارع الجامعة,1.5\nجبل الحسين,2\n";
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "نموذج_مناطق_التوصيل.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function DeliveryAreasPanel({ bot, api }) {
  const [fees, setFees] = useState([]);
  const [branches, setBranches] = useState([]);
  const [activeKey, setActiveKey] = useState(GENERAL_AREAS_KEY); // GENERAL_AREAS_KEY أو معرّف فرع
  const [area, setArea] = useState(""); const [fee, setFee] = useState(""); const [q, setQ] = useState("");
  const [uploadMsg, setUploadMsg] = useState("");
  const [uploading, setUploading] = useState(false);
  const fileInputRef = useRef(null);

  const load = () => {
    api(`/api/bots/${bot.id}/delivery-fees`).then(setFees);
    api(`/api/bots/${bot.id}/branches`).then(setBranches);
  };
  useEffect(() => { load(); }, [bot.id]);

  const save = async (updated) => { setFees(updated); await api(`/api/bots/${bot.id}/delivery-fees`, { method: "PUT", body: updated }); };
  const activeBranchId = activeKey === GENERAL_AREAS_KEY ? null : activeKey;
  const activeLabel = activeKey === GENERAL_AREAS_KEY ? "عام (كل الفروع)" : (branches.find((b) => b.id === activeKey)?.name || "فرع");

  const matchesActive = (f) => (f.branchId || null) === activeBranchId;
  const activeFees = fees.filter(matchesActive);
  const filtered = activeFees.filter((f) => f.area.toLowerCase().includes(q.toLowerCase()));

  const addRow = () => {
    if (!area.trim() || !fee) return;
    save([...fees, { area: area.trim(), fee: Number(fee), branchId: activeBranchId }]);
    setArea(""); setFee("");
  };
  const removeRow = (target) => save(fees.filter((f) => f !== target));
  const clearActive = () => {
    if (!activeFees.length) return;
    if (!confirm(`متأكد بدك تمسح كل مناطق "${activeLabel}" (${activeFees.length})؟`)) return;
    save(fees.filter((f) => !matchesActive(f)));
  };

  const handleUploadFile = async (file) => {
    if (!file) return;
    setUploadMsg(""); setUploading(true);
    try {
      const text = await file.text();
      const rows = parseAreasFile(text);
      if (!rows.length) {
        setUploadMsg("✗ ما لقيت أي صفوف صحيحة بالملف. الصيغة المطلوبة: كل سطر فيه اسم المنطقة وبعده فاصلة وبعدها السعر — مثال: شارع الجامعة,1.5");
        return;
      }
      const tagged = rows.map((r) => ({ ...r, branchId: activeBranchId }));

const emptyBranch = () => ({ id: `branch-${Date.now()}`, name: "", lat: "", lng: "", address: "", mapLink: "", open24h: false, openTime: "15:00", closeTime: "23:59" });
const AMMAN_CENTER = [31.9539, 35.9106];

// خريطة حية (OpenStreetMap عن طريق Leaflet) بدبوس قابل للسحب — عشان تحدد موقع الفرع بالضبط بدل ما تدور
// على الإحداثيات يدوياً. دوس بأي مكان بالخريطة أو اسحب الدبوس، ومنحدّث خط العرض/الطول تلقائياً.
function BranchMapPicker({ lat, lng, onChange, branchKey }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markerRef = useRef(null);
  const onChangeRef = useRef(onChange);
  useEffect(() => { onChangeRef.current = onChange; }, [onChange]);

  useEffect(() => {
    if (!containerRef.current || mapRef.current || typeof L === "undefined") return;
    const map = L.map(containerRef.current).setView(AMMAN_CENTER, 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap",
    }).addTo(map);
    const marker = L.marker(AMMAN_CENTER, { draggable: true }).addTo(map);
    marker.on("dragend", () => { const pos = marker.getLatLng(); onChangeRef.current(pos.lat, pos.lng); });
    map.on("click", (e) => { marker.setLatLng(e.latlng); onChangeRef.current(e.latlng.lat, e.latlng.lng); });
    mapRef.current = map;
    markerRef.current = marker;
    setTimeout(() => map.invalidateSize(), 200);
    return () => { map.remove(); mapRef.current = null; markerRef.current = null; };
  }, []);

  // لما نبدل الفرع المختار، نعيد توسيط الخريطة على موقعه (أو وسط عمّان لو ما عندوش إحداثيات بعد)
  useEffect(() => {
    if (!mapRef.current || !markerRef.current) return;
    const latNum = Number(lat), lngNum = Number(lng);
    const hasPoint = lat !== "" && lng !== "" && !Number.isNaN(latNum) && !Number.isNaN(lngNum);
    const point = hasPoint ? [latNum, lngNum] : AMMAN_CENTER;
    mapRef.current.setView(point, hasPoint ? 16 : 12);
    markerRef.current.setLatLng(point);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [branchKey]);

  // لو تغيّرت الإحداثيات (كتابة يدوية بالحقول)، نحرّك الدبوس بس بدون ما نلغي تمركز المستخدم بالخريطة
  useEffect(() => {
    if (!markerRef.current) return;
    const latNum = Number(lat), lngNum = Number(lng);
    if (lat === "" || lng === "" || Number.isNaN(latNum) || Number.isNaN(lngNum)) return;
    markerRef.current.setLatLng([latNum, lngNum]);
  }, [lat, lng]);

  return <div ref={containerRef} className="branch-map" />;
}

function BranchesPanel({ bot, api }) {
  const [branches, setBranches] = useState([]);
  const [selectedId, setSelectedId] = useState(null);

  const load = () => api(`/api/bots/${bot.id}/branches`).then((d) => { setBranches(d); if (d.length && !selectedId) setSelectedId(d[0].id); });
  useEffect(() => { load(); }, [bot.id]);

  const save = async (updated) => { setBranches(updated); await api(`/api/bots/${bot.id}/branches`, { method: "PUT", body: updated }); };
  const addBranch = () => { const b = emptyBranch(); setBranches([...branches, b]); setSelectedId(b.id); };
  const updateFields = (patch) => setBranches(branches.map((b) => (b.id === selectedId ? { ...b, ...patch } : b)));
  const update = (field, value) => updateFields({ [field]: value });
  const setMapPosition = (newLat, newLng) => updateFields({ lat: Number(newLat.toFixed(6)), lng: Number(newLng.toFixed(6)) });
  const selected = branches.find((b) => b.id === selectedId);

  const saveAll = async () => {
    const cleaned = branches.map((b) => ({ ...b, lat: Number(b.lat), lng: Number(b.lng) }));
    if (cleaned.some((b) => !b.name.trim() || Number.isNaN(b.lat) || Number.isNaN(b.lng))) {
      return alert("كل فرع لازم يكون له اسم وإحداثيات (خط عرض وطول) صحيحة.");
    }
    try {
      await save(cleaned);
      alert("تم الحفظ ✅");
    } catch (err) {
      alert(err.message);
    }
  };

  const removeBranch = () => {
    if (!selected) return;
    if (!confirm(`متأكد بدك تحذف فرع "${selected.name || "بدون اسم"}"؟`)) return;
    const updated = branches.filter((b) => b.id !== selectedId);

        </div>
        <div style={{ padding: 10 }}>
          {branches.length === 0 && <p style={{ color: "var(--ink-dim)", fontSize: 13, padding: 6 }}>ولا فرع مسجل بعد — ضيف فرع عشان البوت يقدر يحسب أقرب فرع ورسم توصيل تلقائي لما الزبون يبعت موقعه.</p>}
          {branches.map((b) => (
            <div key={b.id} className="panel-2" style={{ marginBottom: 6, cursor: "pointer", borderColor: selectedId === b.id ? "var(--amber)" : "var(--line)" }} onClick={() => setSelectedId(b.id)}>
              <span style={{ fontSize: 13 }}>{b.name || "فرع بدون اسم"}</span>
            </div>
          ))}
        </div>
      </div>

      {selected && (
        <div className="panel">
          <div className="grid2 mb14">
            <div><label className="small">اسم الفرع</label><input value={selected.name} onChange={(e) => update("name", e.target.value)} placeholder="مثال: شارع الجامعة" /></div>
            <div><label className="small">العنوان</label><input value={selected.address} onChange={(e) => update("address", e.target.value)} placeholder="عنوان الفرع بالتفصيل" /></div>
          </div>
          <label className="small">حدد موقع الفرع على الخريطة (دوس بالمكان الصحيح أو اسحب الدبوس)</label>
          <div className="mb14">
            <BranchMapPicker lat={selected.lat} lng={selected.lng} onChange={setMapPosition} branchKey={selected.id} />
          </div>
          <div className="grid2 mb14">

            <div><label className="small">خط الطول (lng)</label><input dir="ltr" value={selected.lng} onChange={(e) => update("lng", e.target.value)} placeholder="مثال: 35.9106" /></div>
          </div>
          <div className="small" style={{ color: "var(--ink-dim)", marginBottom: 14 }}>
            الطريقة الأسهل: حدد الموقع مباشرة عالخريطة فوق. أو بديل يدوي: افتح خرائط جوجل، دوس زر يمين على مكان الفرع بالضبط، وانسخ الرقمين يلي بيطلعوا (خط العرض، خط الطول) هون.
          </div>
          <div className="mb14"><label className="small">رابط خرائط جوجل (اختياري)</label><input dir="ltr" value={selected.mapLink} onChange={(e) => update("mapLink", e.target.value)} placeholder="https://maps.app.goo.gl/..." /></div>

          <div className="mb14">
            <div className="flex" style={{ justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>

              <>
                <div className="flex gap8">
                  <div style={{ flex: 1 }}><label className="small">فتح</label><input type="time" value={selected.openTime} onChange={(e) => update("openTime", e.target.value)} /></div>

          </div>
        </div>
      )}
    </div>
  );
}

function OrdersPanel({ bot, api }) {

  const load = () => api(`/api/bots/${bot.id}/orders`).then(setOrders);

  const markCompleted = async (orderId) => {

  const shown = tab === "current" ? current : completed;

  return (
    <div className="flexcol gap14">

  );
}

function timeAgoShort(iso) {
  if (!iso) return "—";
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "الآن";
  if (mins < 60) return `قبل ${mins}د`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `قبل ${hrs}س`;
  const days = Math.floor(hrs / 24);
  return `قبل ${days}ي`;
}

        <div className="flexcol" style={{ width: 300, flexShrink: 0, borderLeft: "1px solid var(--line)", height: "100%" }}>
          <div className="flexcol gap8" style={{ padding: 12, borderBottom: "1px solid var(--line)" }}>
            <input placeholder="دور باسم أو رقم..." value={search} onChange={(e) => setSearch(e.target.value)} style={{ fontSize: 13 }} />
            <div className="flex gap8">
              <div className={`chip ${filter === "all" ? "active" : ""}`} style={{ fontSize: 12 }} onClick={() => setFilter("all")}>الكل ({list.length})</div>
              <div className={`chip ${filter === "ordered" ? "active" : ""}`} style={{ fontSize: 12 }} onClick={() => setFilter("ordered")}>🛒 طلبوا بس ({orderedCount})</div>
            </div>
          </div>
          <div style={{ overflowY: "auto", flex: 1 }}>
            {loading ? (
              <p style={{ color: "var(--ink-dim)", padding: 14, fontSize: 13 }}>عم نحمّل...</p>
            ) : filtered.length === 0 ? (
              <p style={{ color: "var(--ink-dim)", padding: 14, fontSize: 13 }}>ولا محادثة مطابقة.</p>
            ) : (
              filtered.map((c) => {
                const lastMsg = c.messages[c.messages.length - 1];
                return (
                  <div
                    key={c.from}
                    onClick={() => setSelectedFrom(c.from)}
                    className="flex gap10"
                    style={{
                      padding: "10px 12px", cursor: "pointer", alignItems: "center",
                      background: selectedFrom === c.from ? "var(--panel-2)" : "transparent",
                      borderBottom: "1px solid var(--line)",
                    }}
                  >
                    <ConvoAvatar name={c.name} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div className="flex" style={{ justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontWeight: 700, fontSize: 13 }}>{c.name || c.phone || "زبون"}</span>
                        <span style={{ fontSize: 10, color: "var(--ink-dim)", flexShrink: 0 }}>{timeAgoShort(c.lastMessageAt)}</span>
                      </div>
                      <div style={{ fontSize: 12, color: "var(--ink-dim)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                        {lastMsg ? lastMsg.content : "—"}
                      </div>
                      <div className="flex gap8" style={{ marginTop: 3 }}>
                        {c.hasOrdered && <span className="tag tag-on" style={{ fontSize: 9, padding: "1px 8px" }}>🛒 طلب قبل</span>}
                        {c.paused && <span className="tag tag-off" style={{ fontSize: 9, padding: "1px 8px" }}>موقوف</span>}
                      </div>
                    </div>
                  </div>
                );
              })
            )}
          </div>
        </div>

        {/* المحادثة المختارة — فقاعات رسائل زي واجهة ماسنجر */}
        <div className="flexcol" style={{ flex: 1, height: "100%", minWidth: 0 }}>
          {!selected ? (
            <div className="flex" style={{ alignItems: "center", justifyContent: "center", height: "100%", color: "var(--ink-dim)" }}>
              اختر محادثة من القائمة
            </div>
          ) : (
            <>
              <div className="flex gap10" style={{ padding: 14, borderBottom: "1px solid var(--line)", alignItems: "center" }}>
                <ConvoAvatar name={selected.name} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700 }}>{selected.name || "زبون"}</div>
                  <div style={{ fontSize: 12, color: "var(--ink-dim)" }}>
                    {selected.phone}{selected.area ? ` — 📍 ${selected.area}` : ""}
                  </div>
                </div>
                {selected.hasOrdered && <span className="tag tag-on">🛒 طلب من قبل</span>}
                {selected.paused && <span className="tag tag-off">موقوف (تدخل بشري)</span>}
              </div>

              {selected.hasOrdered && (
                <div style={{ padding: "8px 14px", fontSize: 12, color: "var(--ink-dim)", borderBottom: "1px solid var(--line)" }}>
                  آخر طلب: {(selected.lastItems || []).join("، ") || "—"} {selected.lastOrderAt ? `— ${new Date(selected.lastOrderAt).toLocaleString("ar-JO")}` : ""}
                </div>
              )}

              <div className="flexcol gap8" style={{ flex: 1, overflowY: "auto", padding: 16 }}>
                {selected.messages.length === 0 && <div style={{ color: "var(--ink-dim)", fontSize: 13 }}>ولا رسالة محفوظة.</div>}
                {selected.messages.map((m, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-start" : "flex-end" }}>
                    <div style={{
                      maxWidth: "70%", padding: "8px 12px", borderRadius: 14, fontSize: 13, lineHeight: 1.5,
                      background: m.role === "user" ? "var(--panel-2)" : "var(--amber)",
                      color: m.role === "user" ? "var(--ink)" : "#1a1200",
                      border: m.role === "user" ? "1px solid var(--line)" : "none",
                    }}>
                      {m.content}
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

const ROLES = [["owner","مدير كامل","وصول لكل شي"],["orders","موظف طلبات","الطلبات والمنيو بس"],["viewer","مشاهدة فقط","بدون تعديل"]];
function EmployeesPanel({ api, allBots }) {
  const [employees, setEmployees] = useState([]);
  const [name, setName] = useState(""); const [email, setEmail] = useState(""); const [role, setRole] = useState("orders");
  const [assignedBotIds, setAssignedBotIds] = useState([]);
  const [lastInvite, setLastInvite] = useState(null);
  const [pwFor, setPwFor] = useState(null);
  const [pwValue, setPwValue] = useState("");

  const load = () => api("/api/dashboard/employees").then(setEmployees).catch(() => {});
  useEffect(() => { load(); }, []);

  const toggleBot = (id) => setAssignedBotIds((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);

  const invite = async () => {
    if (!name.trim() || !email.trim()) return;
    const res = await api("/api/dashboard/employees", { method: "POST", body: { name, email, role, assignedBotIds } });
    setLastInvite(res);
    setName(""); setEmail(""); setAssignedBotIds([]);
    load();
  };
  const copyLink = () => { navigator.clipboard.writeText(lastInvite.inviteLink); alert("انسخ ✅"); };

  const setPassword = async () => {
    if (!pwValue || pwValue.length < 6) return alert("كلمة المرور لازم تكون 6 أحرف على الأقل.");
    await api(`/api/dashboard/employees/${pwFor}/set-password`, { method: "POST", body: { newPassword: pwValue } });
    alert("تم تعيين كلمة المرور ✅");
    setPwFor(null); setPwValue(""); load();
  };

  const updateBotsFor = async (emp, botId) => {
    const current = emp.assignedBotIds || [];
    const updated = current.includes(botId) ? current.filter((x) => x !== botId) : [...current, botId];
    await api(`/api/dashboard/employees/${emp.id}/bots`, { method: "PUT", body: { assignedBotIds: updated } });
    load();
  };

  const changeRole = async (emp, newRole) => {
    if (newRole === emp.role) return;
    try {
      await api(`/api/dashboard/employees/${emp.id}/role`, { method: "PUT", body: { role: newRole } });
      load();
    } catch (err) {
      alert(err.message);
    }
  };

  const deleteEmployee = async (emp) => {
    if (!confirm(`متأكد بدك تحذف "${emp.name}"؟ رح يفقد وصوله للداشبورد فوراً.`)) return;
    try {
      await api(`/api/dashboard/employees/${emp.id}`, { method: "DELETE" });
      load();
    } catch (err) {
      alert(err.message);
    }
  };

  return (
    <div className="flexcol gap14">
      <div className="panel">
        <div style={{ fontWeight: 700, marginBottom: 14 }}>إضافة موظف</div>
        <div className="grid2 mb14">
          <input placeholder="الاسم" value={name} onChange={(e) => setName(e.target.value)} />
          <input placeholder="الإيميل" dir="ltr" value={email} onChange={(e) => setEmail(e.target.value)} />
        </div>
        <div className="grid3 mb14">
          {ROLES.map(([id, label, hint]) => (
            <div key={id} className={`preset ${role === id ? "active" : ""}`} onClick={() => setRole(id)}>
              <div style={{ fontWeight: 700, fontSize: 13, color: role === id ? "var(--amber)" : "var(--ink)" }}>{label}</div>
              <div style={{ fontSize: 11, color: "var(--ink-dim)" }}>{hint}</div>
            </div>
          ))}
        </div>

        {role !== "owner" && (
          <div className="mb14">
            <label className="small">أي بوتات يشوف؟ (فاضي = ولا وحدة)</label>
            <div className="flex gap8" style={{ flexWrap: "wrap" }}>
              {allBots.map((b) => (
                <div key={b.id} className={`chip ${assignedBotIds.includes(b.id) ? "active" : ""}`} onClick={() => toggleBot(b.id)}>{b.name}</div>
              ))}
            </div>
          </div>
        )}

        <button className="btn" onClick={invite}>إرسال دعوة</button>

        {lastInvite && (
          <div className="panel-2" style={{ marginTop: 14 }}>
            <div style={{ fontSize: 13, marginBottom: 8 }}>
              رابط الدعوة لـ <b>{lastInvite.name}</b> (ابعته يدوياً عن طريق واتساب لحد ما نفعّل الإيميل):
            </div>
            <div className="flex gap8">
              <input readOnly dir="ltr" value={lastInvite.inviteLink} style={{ fontSize: 12 }} />
              <button className="btn-ghost" onClick={copyLink}>نسخ</button>
            </div>
          </div>
        )}
      </div>

      <div className="panel flexcol gap10">
        {employees.map((e) => (
          <div key={e.id} className="panel-2 flexcol gap8">
            <div className="flex" style={{ justifyContent: "space-between", alignItems: "center" }}>
              <span>{e.name} — {e.email}</span>
              <div className="flex gap8" style={{ alignItems: "center" }}>
                <select value={e.role} onChange={(ev) => changeRole(e, ev.target.value)}>
                  {ROLES.map(([id, label]) => <option key={id} value={id}>{label}</option>)}
                </select>
                <span className={`tag ${e.status === "active" ? "tag-on" : "tag-off"}`}>{e.status === "active" ? "نشط" : "دعوة معلقة"}</span>
                <button className="btn-ghost" onClick={() => { setPwFor(pwFor === e.id ? null : e.id); setPwValue(""); }}>🔑 كلمة مرور</button>
                <button className="btn-ghost" onClick={() => deleteEmployee(e)}>🗑 حذف</button>
              </div>
            </div>

            {e.role !== "owner" && (
              <div className="flex gap8" style={{ flexWrap: "wrap" }}>
                <span style={{ fontSize: 11, color: "var(--ink-dim)" }}>البوتات المسموحة:</span>
                {allBots.map((b) => (
                  <div key={b.id} className={`chip ${(e.assignedBotIds || []).includes(b.id) ? "active" : ""}`} style={{ padding: "3px 10px", fontSize: 11 }} onClick={() => updateBotsFor(e, b.id)}>{b.name}</div>
                ))}
              </div>
            )}

            {pwFor === e.id && (
              <div className="flex gap8">
                <input type="password" dir="ltr" placeholder="كلمة مرور جديدة" value={pwValue} onChange={(ev) => setPwValue(ev.target.value)} />
                <button className="btn" onClick={setPassword}>حفظ</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function Dashboard({ employee, onLogout }) {
  const api = useApi();
  const [bots, setBots] = useState([]);
  const [selectedBotId, setSelectedBotId] = useState(null);
  const [tab, setTab] = useState("connections");
  const [newBotName, setNewBotName] = useState("");

  const refreshBots = useCallback(() => { api("/api/bots").then((list) => {
    const visible = employee?.role === "owner" ? list : list.filter((b) => (employee?.assignedBotIds || []).includes(b.id));
    setBots(visible);
    setSelectedBotId((cur) => cur || (visible[0] && visible[0].id));
  }); }, [employee]);
  useEffect(() => { refreshBots(); }, []);

  // لو راجعين من "تسجيل الدخول بفيسبوك" (بعد ما ميتا وجّهت المتصفح لهون)، نفتح البوت الصح على تبويب الربط تلقائياً
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const metaConnected = params.get("metaConnected");
    if (metaConnected) {
      setSelectedBotId(metaConnected);
      setTab("connections");
    }
  }, []);

  const createBot = async () => { if (!newBotName.trim()) return; const bot = await api("/api/bots", { method: "POST", body: { name: newBotName.trim() } }); setNewBotName(""); refreshBots(); setSelectedBotId(bot.id); };
  const deleteBot = async (bot) => {
    if (!confirm(`متأكد إنك بدك تحذف بوت "${bot.name}"؟ رح ينحذف نهائياً مع كل إعداداته وطلباته — ما بينرجع.`)) return;
    await api(`/api/bots/${bot.id}`, { method: "DELETE" });
    if (selectedBotId === bot.id) setSelectedBotId(null);
    refreshBots();
  };
  const selectedBot = bots.find((b) => b.id === selectedBotId);

  const tabs = [
    ["connections", "الربط والمنصات"], ["style", "الأسلوب والسلوك"], ["security", "الأمان والحواجز"],
    ["human", "التحكم اليدوي"], ["menu", "المنيو والصور"], ["branches", "الفروع"], ["delivery", "التوصيل والأسعار"],
    ["orders", "الطلبات"], ["conversations", "المحادثات"], ["employees", "الموظفين والصلاحيات"],
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <aside style={{ width: 260, background: "var(--panel)", borderLeft: "1px solid var(--line)", display: "flex", flexDirection: "column" }}>
        <div style={{ padding: 20, borderBottom: "1px solid var(--line)" }}>
          <div style={{ fontWeight: 700 }}><span style={{ color: "var(--amber)" }}>Saber</span> Jo Snack</div>
          <div style={{ fontSize: 12, color: "var(--ink-dim)" }}>مرحباً، {employee?.name}</div>
        </div>
        <div style={{ padding: 14, borderBottom: "1px solid var(--line)" }}>
          <div style={{ fontSize: 12, color: "var(--ink-dim)", marginBottom: 8 }}>البوتات</div>
          {bots.map((b) => (
            <div key={b.id} onClick={() => setSelectedBotId(b.id)} className="flex" style={{ justifyContent: "space-between", alignItems: "center", padding: "8px 10px", borderRadius: 6, cursor: "pointer", marginBottom: 4, background: b.id === selectedBotId ? "var(--panel-2)" : "transparent" }}>
              <span style={{ fontSize: 13 }}>{b.name}</span>
              <span className="flex gap8" style={{ alignItems: "center" }}>
                <span className={`tag ${b.enabled === false ? "tag-off" : "tag-on"}`} style={{ fontSize: 10 }}>{b.enabled === false ? "موقوف" : "شغال"}</span>
                {employee?.role === "owner" && (
                  <span
                    title="حذف البوت"
                    onClick={(e) => { e.stopPropagation(); deleteBot(b); }}
                    style={{ fontSize: 13, color: "var(--ink-dim)", padding: "0 4px" }}
                  >
                    🗑
                  </span>
                )}
              </span>
            </div>
          ))}
          {employee?.role === "owner" && (
            <div className="flex gap8" style={{ marginTop: 10 }}>
              <input placeholder="اسم بوت جديد" value={newBotName} onChange={(e) => setNewBotName(e.target.value)} style={{ fontSize: 12 }} />
              <button className="btn-ghost" onClick={createBot}>+</button>
            </div>
          )}
        </div>
        {selectedBot && <nav style={{ flex: 1, paddingTop: 10, overflowY: "auto" }}>{tabs.map(([id, label]) => <button key={id} className={`nav-item ${tab === id ? "active" : ""}`} onClick={() => setTab(id)}>{label}</button>)}</nav>}
        <div style={{ padding: 14, borderTop: "1px solid var(--line)" }}><button className="btn-ghost" style={{ width: "100%" }} onClick={onLogout}>تسجيل خروج</button></div>
      </aside>

      <main style={{ flex: 1, padding: 28, overflowY: "auto" }}>
        {!selectedBot && <p style={{ color: "var(--ink-dim)" }}>ولا بوت موجود لسا.</p>}
        {selectedBot && tab === "connections" && <ConnectionsPanel bot={selectedBot} api={api} refreshBots={refreshBots} />}
        {selectedBot && tab === "style" && <StylePanel bot={selectedBot} api={api} refreshBots={refreshBots} />}
        {selectedBot && tab === "security" && <SecurityPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "human" && <HumanTakeoverPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "menu" && <MenuPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "branches" && <BranchesPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "delivery" && <DeliveryPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "orders" && <OrdersPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "conversations" && <ConversationsPanel bot={selectedBot} api={api} />}
        {selectedBot && tab === "employees" && <EmployeesPanel api={api} allBots={bots} />}
      </main>
    </div>
  );
}

function App() {
  const [employee, setEmployee] = useState(() => { const raw = localStorage.getItem("sj_employee"); return raw ? JSON.parse(raw) : null; });
  const token = new URLSearchParams(window.location.search).get("token");
  const logout = () => { localStorage.removeItem("sj_token"); localStorage.removeItem("sj_employee"); setEmployee(null); };
  const clearTokenAndReload = () => { window.location.href = "/dashboard"; };

  if (token) return <SetPassword token={token} onDone={clearTokenAndReload} />;
  if (!employee) return <Login onLoggedIn={setEmployee} />;
  return <Dashboard employee={employee} onLogout={logout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
